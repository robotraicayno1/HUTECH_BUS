<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: layout(~{::div}, 'Quản lý Xe Bus', 'vehicles')}">
<body>
    <div>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Quản lý Xe Bus</h2>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#vehicleModal" onclick="clearForm()">
                <i class="bi bi-plus-circle"></i> Thêm Xe Mới
            </button>
        </div>

        <div class="card card-custom p-4">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Biển số</th>
                            <th>Sức chứa</th>
                            <th>Trạng thái</th>
                            <th>Tuyến (Route ID)</th>
                            <th>Tài xế</th>
                            <th class="text-end">Hành động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="info : ${vehicleInfos}">
                            <td class="fw-bold" th:text="${info.licensePlate}">51B-123.45</td>
                            <td th:text="${info.capacity} + ' chỗ'">45 chỗ</td>
                            <td>
                                <span class="badge" th:classappend="${info.status == 'Hoạt động' ? 'bg-success' : (info.status == 'Bảo trì' ? 'bg-warning text-dark' : 'bg-secondary')}" th:text="${info.status}">Hoạt động</span>
                            </td>
                            <td th:text="${info.routeId != null ? info.routeId : 'Chưa phân công'}">Route_ID</td>
                            <td>
                                <div th:if="${info.isActive}">
                                    <span class="badge bg-danger animate-pulse mb-1" style="font-size: 0.6rem;">LIVE</span><br/>
                                    <span class="fw-bold text-danger" th:text="${info.activeDriverName}">Tài xế Đang chạy</span>
                                </div>
                                <div th:unless="${info.isActive}">
                                    <span class="text-muted" th:text="${info.assignedDriverName != null ? info.assignedDriverName : 'Chưa phân công'}">Tài xế</span>
                                </div>
                            </td>
                            <td class="text-end">
                                <button class="btn btn-sm btn-outline-primary me-2" 
                                        th:attr="onclick=|editVehicle('${info.id}', '${info.licensePlate}', '${info.capacity}', '${info.status}', '${info.routeId}', '${info.driverId}')|">
                                    <i class="bi bi-pencil"></i> Sửa
                                </button>
                                <form th:action="@{/admin/vehicles/delete/{id}(id=${info.id})}" method="post" class="d-inline" onsubmit="return confirm('Bạn có chắc chắn muốn xóa xe này?');">
                                    <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i> Xóa</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(vehicles)}">
                            <td colspan="6" class="text-center text-muted py-4">Chưa có dữ liệu xe bus nào.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Add/Edit Modal -->
        <div class="modal fade" id="vehicleModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content border-0 shadow-lg">
                    <div class="modal-header bg-primary text-white">
                        <h5 class="modal-title" id="vehicleModalLabel">Thông tin Xe Bus</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <form th:action="@{/admin/vehicles/save}" th:object="${newVehicle}" method="post">
                        <div class="modal-body">
                            <!-- Hidden ID field for update -->
                            <input type="hidden" id="v_id" name="id" />
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">Biển số xe</label>
                                <input type="text" class="form-control" id="v_licensePlate" name="licensePlate" required placeholder="VD: 51B-123.45">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Sức chứa (chỗ)</label>
                                <input type="number" class="form-control" id="v_capacity" name="capacity" min="1" required value="45">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Trạng thái</label>
                                <select class="form-select" id="v_status" name="status">
                                    <option value="Hoạt động">Hoạt động</option>
                                    <option value="Bảo trì">Bảo trì</option>
                                    <option value="Dừng">Dừng</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Phân công tuyến</label>
                                <select class="form-select" id="v_routeId" name="routeId">
                                    <option value="">-- Chưa phân công --</option>
                                    <option th:each="r : ${routes}" th:value="${r.id}" th:text="|${r.name} (${r.id})|"></option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Phân công tài xế</label>
                                <select class="form-select" id="v_driverId" name="driverId">
                                    <option value="">-- Chưa phân công --</option>
                                    <option th:each="d : ${drivers}" th:value="${d.username}" th:text="|${d.fullName} (${d.username})|"></option>
                                </select>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                            <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Lưu lại</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Inline JS to handle modal population -->
        <script>
            function clearForm() {
                document.getElementById('v_id').value = '';
                document.getElementById('v_licensePlate').value = '';
                document.getElementById('v_capacity').value = '45';
                document.getElementById('v_status').value = 'Hoạt động';
                document.getElementById('v_routeId').value = '';
                document.getElementById('v_driverId').value = '';
            }

            function editVehicle(id, licensePlate, capacity, status, routeId, driverId) {
                document.getElementById('v_id').value = id;
                document.getElementById('v_licensePlate').value = licensePlate;
                document.getElementById('v_capacity').value = capacity;
                document.getElementById('v_status').value = status;
                document.getElementById('v_routeId').value = (routeId === 'null' || !routeId) ? '' : routeId;
                document.getElementById('v_driverId').value = (driverId === 'null' || !driverId) ? '' : driverId;
                
                var myModal = new bootstrap.Modal(document.getElementById('vehicleModal'));
                myModal.show();
            }
        </script>
    </div>
</body>
</html>
