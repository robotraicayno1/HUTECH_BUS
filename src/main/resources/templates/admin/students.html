<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: layout(~{::div}, 'Quản lý Sinh viên', 'students')}">
<body>
    <div>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Quản lý Sinh viên</h2>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#studentModal" onclick="clearForm()">
                <i class="bi bi-person-plus-fill"></i> Thêm Sinh viên Mới
            </button>
        </div>

        <div class="card card-custom p-4">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Họ và Tên</th>
                            <th>Mã số Sinh viên</th>
                            <th>Role</th>
                            <th class="text-end">Hành động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="s : ${students}">
                            <td class="fw-bold" th:text="${s.fullName}">Họ và Tên</td>
                            <td th:text="${s.username}">Mã số</td>
                            <td>
                                <span class="badge bg-primary">STUDENT</span>
                            </td>
                            <td class="text-end">
                                <button class="btn btn-sm btn-outline-primary me-2" 
                                        th:attr="onclick=|editStudent('${s.id}', '${s.fullName}', '${s.username}')|">
                                    <i class="bi bi-pencil"></i> Sửa
                                </button>
                                <form th:action="@{/admin/students/delete/{id}(id=${s.id})}" method="post" class="d-inline" onsubmit="return confirm('Bạn có chắc chắn muốn xóa sinh viên này?');">
                                    <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i> Xóa</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(students)}">
                            <td colspan="4" class="text-center text-muted py-4">Chưa có dữ liệu sinh viên nào.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Add/Edit Modal -->
        <div class="modal fade" id="studentModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content border-0 shadow-lg">
                    <div class="modal-header bg-primary text-white">
                        <h5 class="modal-title" id="studentModalLabel">Thông tin Sinh viên</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <form th:action="@{/admin/students/save}" method="post">
                        <div class="modal-body">
                            <!-- Hidden ID field for update -->
                            <input type="hidden" id="s_id" name="id" />
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">Họ và Tên</label>
                                <input type="text" class="form-control" id="s_fullName" name="fullName" required placeholder="Họ Tên">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Mã số Sinh viên</label>
                                <input type="text" class="form-control" id="s_username" name="username" required placeholder="Tên đăng nhập">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Mật khẩu mới (Bỏ trống nếu giữ nguyên)</label>
                                <input type="password" class="form-control" id="s_password" name="password" placeholder="Nhập để cập nhật">
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                            <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Lưu lại</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Inline JS to handle modal population -->
        <script>
            function clearForm() {
                document.getElementById('s_id').value = '';
                document.getElementById('s_fullName').value = '';
                document.getElementById('s_username').value = '';
                document.getElementById('s_password').value = '';
            }

            function editStudent(id, fullName, username) {
                document.getElementById('s_id').value = id;
                document.getElementById('s_fullName').value = fullName;
                document.getElementById('s_username').value = username;
                document.getElementById('s_password').value = ''; // Don't show old password
                
                var myModal = new bootstrap.Modal(document.getElementById('studentModal'));
                myModal.show();
            }
        </script>
    </div>
</body>
</html>
