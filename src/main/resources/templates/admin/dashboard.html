<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: layout(~{::div}, 'Tổng quan - Admin', 'dashboard')}">
<body>
    <div>
        <h2 class="mb-4 d-flex justify-content-between align-items-center">
            Tổng Quan Hệ Thống
            <button class="btn btn-outline-primary" onclick="location.reload()"><i class="bi bi-arrow-clockwise"></i> Làm mới</button>
        </h2>

        <!-- Summary Cards -->
        <div class="row g-4 mb-4">
            <div class="col-md-3">
                <div class="card card-custom p-4 border-start border-4 border-primary h-100">
                    <h5 class="text-muted mb-2"><i class="bi bi-bus-front"></i> TỔNG SỐ XE</h5>
                    <h2 class="display-6 fw-bold text-dark mb-0" th:text="${vehicleCount}">0</h2>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card card-custom p-4 border-start border-4 border-success h-100">
                    <h5 class="text-muted mb-2"><i class="bi bi-map"></i> TỔNG TUYẾN</h5>
                    <h2 class="display-6 fw-bold text-dark mb-0" th:text="${routeCount}">0</h2>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card card-custom p-4 border-start border-4 border-info h-100">
                    <h5 class="text-muted mb-2"><i class="bi bi-people"></i> KHÁCH (30 ngày)</h5>
                    <h2 class="display-6 fw-bold text-dark mb-0" th:text="${totalPassengers30d}">0</h2>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card card-custom p-4 border-start border-4 border-warning h-100">
                    <h5 class="text-muted mb-2"><i class="bi bi-graph-up"></i> TỔNG LƯỢT ĐI</h5>
                    <h2 class="display-6 fw-bold text-dark mb-0" th:text="${totalAllPassengers}">0</h2>
                </div>
            </div>
        </div>

        <!-- Charts Row -->
        <div class="row g-4 mb-4">
            <!-- Line Chart: 30-day Traffic -->
            <div class="col-lg-8">
                <div class="card card-custom p-4 shadow-sm border-0 h-100">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="fw-bold mb-0"><i class="bi bi-graph-up-arrow text-primary me-2"></i> Lưu lượng hành khách (30 ngày gần nhất)</h5>
                        <span class="badge bg-light text-primary border border-primary">Live Data</span>
                    </div>
                    <div style="height: 300px; position: relative;">
                        <canvas id="trafficChart"></canvas>
                    </div>
                </div>
            </div>
            <!-- Bar Chart: Route Density -->
            <div class="col-lg-4">
                <div class="card card-custom p-4 shadow-sm border-0 h-100">
                    <h5 class="fw-bold mb-3"><i class="bi bi-bar-chart text-primary me-2"></i> Mật độ theo tuyến</h5>
                    <div style="height: 300px; position: relative;">
                        <canvas id="routeChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- Recent History Table -->
        <div class="row">
            <div class="col-12">
                <div class="card card-custom p-4 shadow-sm border-0">
                    <h5 class="fw-bold mb-3"><i class="bi bi-clock-history text-primary me-2"></i> Chuyến đi gần đây (7 ngày)</h5>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>Người dùng</th>
                                    <th>Tuyến đường</th>
                                    <th>Thời gian</th>
                                    <th>Trạng thái</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:if="${#lists.isEmpty(recentHistory)}">
                                    <td colspan="4" class="text-center text-muted py-3">Chưa có dữ liệu</td>
                                </tr>
                                <tr th:each="h : ${recentHistory}">
                                    <td>
                                        <span class="badge bg-light text-dark border"><i class="bi bi-person me-1"></i><span th:text="${h.userId}"></span></span>
                                    </td>
                                    <td th:text="${h.routeName != null ? h.routeName : 'Không rõ'}"></td>
                                    <td th:text="${#temporals.format(h.tripDate, 'dd/MM/yyyy HH:mm')}"></td>
                                    <td>
                                        <span th:if="${h.status == 'COMPLETED'}" class="badge bg-success">Hoàn thành</span>
                                        <span th:unless="${h.status == 'COMPLETED'}" class="badge bg-secondary" th:text="${h.status != null ? h.status : 'N/A'}"></span>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script th:inline="javascript">
            document.addEventListener('DOMContentLoaded', function() {
                // Shared Data
                const labels = /*[[${chartLabels}]]*/ [];
                const values = /*[[${chartValues}]]*/ [];
                const routeLabels = /*[[${routeLabels}]]*/ [];
                const routeValues = /*[[${routeValues}]]*/ [];

                // 1. Traffic Line Chart
                new Chart(document.getElementById('trafficChart').getContext('2d'), {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Hành khách',
                            data: values,
                            backgroundColor: 'rgba(255, 107, 0, 0.1)',
                            borderColor: '#ff6b00',
                            borderWidth: 3,
                            fill: true,
                            tension: 0.4,
                            pointBackgroundColor: '#ff6b00',
                            pointBorderColor: '#fff',
                            pointHoverRadius: 6
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            y: { beginAtZero: true, ticks: { precision: 0 }, grid: { color: 'rgba(0,0,0,0.05)' } },
                            x: { grid: { display: false } }
                        }
                    }
                });

                // 2. Route Density Bar Chart
                const bgColors = ['#ff6b00','#003366','#10b981','#f59e0b','#6366f1'];
                new Chart(document.getElementById('routeChart').getContext('2d'), {
                    type: 'bar',
                    data: {
                        labels: routeLabels,
                        datasets: [{
                            label: 'Lượt đi',
                            data: routeValues,
                            backgroundColor: routeLabels.map((_, i) => bgColors[i % bgColors.length]),
                            borderRadius: 5
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        indexAxis: 'y',
                        plugins: { legend: { display: false } },
                        scales: {
                            x: { beginAtZero: true, ticks: { precision: 0 } },
                            y: { grid: { display: false } }
                        }
                    }
                });
            });
        </script>
    </div>

</body>
</html>
