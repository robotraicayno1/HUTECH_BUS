<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: layout(~{::div}, 'Quản lý Nhân sự', 'staffs')}">

<body>
    <div>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Quản lý Cán bộ / Tài xế</h2>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#userModal" onclick="clearForm()">
                <i class="bi bi-person-plus-fill"></i> Thêm Nhân sự Mới
            </button>
        </div>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <div class="card card-custom p-4">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Họ và Tên</th>
                            <th>Mã số Nhân sự</th>
                            <th>Chức vụ (Role)</th>
                            <th class="text-end">Hành động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="u : ${users}">
                            <td class="fw-bold" th:text="${u.fullName}">Tên NV</td>
                            <td th:text="${u.username}">123456</td>
                            <td>
                                <span class="badge bg-warning text-dark"
                                    th:text="${u.roles != null ? #strings.listJoin(u.roles, ', ') : 'STAFF'}">STAFF</span>
                            </td>
                            <td class="text-end">
                                <button class="btn btn-sm btn-outline-primary me-2"
                                    th:attr="onclick=|editUser('${u.id}', '${u.fullName}', '${u.username}', '${u.roles.iterator().next()}')|">
                                    <i class="bi bi-pencil"></i> Sửa
                                </button>
                                <!-- Ngăn Admin xóa chính mình: Nếu username = principal username thì disable -->
                                <th:block th:if="${u.username == username}">
                                    <button class="btn btn-sm btn-outline-secondary" disabled>Đang dùng</button>
                                </th:block>
                                <form th:if="${u.username != username}"
                                    th:action="@{/admin/users/delete/{id}(id=${u.id})}" method="post" class="d-inline"
                                    onsubmit="return confirm('Bạn có chắc chắn muốn xóa nhân sự này?');">
                                    <input type="hidden" name="pageType" value="staff">
                                    <button type="submit" class="btn btn-sm btn-outline-danger"><i
                                            class="bi bi-trash"></i> Xóa</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(users)}">
                            <td colspan="4" class="text-center text-muted py-4">Chưa có dữ liệu nhân sự nào.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Add/Edit Modal -->
        <div class="modal fade" id="userModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content border-0 shadow-lg">
                    <div class="modal-header bg-primary text-white">
                        <h5 class="modal-title" id="userModalLabel">Thông tin Nhân sự</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <form th:action="@{/admin/users/save}" th:object="${newUser}" method="post">
                        <div class="modal-body">
                            <input type="hidden" id="u_id" name="id" />
                            <input type="hidden" name="pageType" value="staff">

                            <div class="mb-3">
                                <label class="form-label fw-bold">Họ và Tên</label>
                                <input type="text" class="form-control" id="u_fullName" name="fullName" required
                                    placeholder="Họ Tên">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Mã số phân phối (Tên đăng nhập)</label>
                                <input type="text" class="form-control" id="u_username" name="username" required
                                    placeholder="Nhập ID Duy nhất">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Mật khẩu mới (Bỏ trống nếu giữ nguyên)</label>
                                <input type="password" class="form-control" id="u_password" name="newPassword"
                                    placeholder="Nhập để cập nhật">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Vai trò (Role)</label>
                                <select class="form-select" id="u_role" name="role">
                                    <option value="STAFF">Cán bộ / Giáo viên / Nhân viên (STAFF)</option>
                                    <option value="DRIVER">Tài xế (DRIVER)</option>
                                </select>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                            <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Lưu lại</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Inline JS -->
        <script>
            function clearForm() {
                document.getElementById('u_id').value = '';
                document.getElementById('u_fullName').value = '';
                document.getElementById('u_username').value = '';
                document.getElementById('u_password').value = '';
                document.getElementById('u_role').value = 'STAFF';
            }

            function editUser(id, fullName, username, role) {
                document.getElementById('u_id').value = id;
                document.getElementById('u_fullName').value = fullName;
                document.getElementById('u_username').value = username;
                document.getElementById('u_password').value = '';
                document.getElementById('u_role').value = role;

                var myModal = new bootstrap.Modal(document.getElementById('userModal'));
                myModal.show();
            }
        </script>
    </div>
</body>

</html>
