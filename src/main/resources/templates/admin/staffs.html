<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: layout(~{::div}, 'Quản lý Nhân sự', 'staffs')}">
<body>
    <div>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Quản lý Nhân sự</h2>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#staffModal" onclick="clearForm()">
                <i class="bi bi-person-plus-fill"></i> Thêm Nhân sự Mới
            </button>
        </div>

        <div class="card card-custom p-4">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Họ và Tên</th>
                            <th>Mã số phân phối</th>
                            <th>Role</th>
                            <th class="text-end">Hành động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="s : ${staffs}">
                            <td class="fw-bold" th:text="${s.fullName}">Họ và Tên</td>
                            <td th:text="${s.username}">Mã số</td>
                            <td>
                                <!-- Mọi người dùng trong danh sách này đều có role STAFF hoặc DRIVER -->
                                <span class="badge bg-secondary" th:if="${#lists.contains(s.roles, 'STAFF')}">STAFF</span>
                                <span class="badge bg-success" th:if="${#lists.contains(s.roles, 'DRIVER')}">DRIVER</span>
                            </td>
                            <td class="text-end">
                                <button class="btn btn-sm btn-outline-primary me-2" 
                                        th:attr="onclick=|editStaff('${s.id}', '${s.fullName}', '${s.username}', '${#lists.contains(s.roles, 'STAFF') ? 'STAFF' : 'DRIVER'}')|">
                                    <i class="bi bi-pencil"></i> Sửa
                                </button>
                                <form th:action="@{/admin/staffs/delete/{id}(id=${s.id})}" method="post" class="d-inline" onsubmit="return confirm('Bạn có chắc chắn muốn xóa nhân sự này?');">
                                    <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i> Xóa</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(staffs)}">
                            <td colspan="4" class="text-center text-muted py-4">Chưa có dữ liệu nhân sự nào.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Add/Edit Modal -->
        <div class="modal fade" id="staffModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content border-0 shadow-lg">
                    <div class="modal-header bg-primary text-white">
                        <h5 class="modal-title" id="staffModalLabel">Thông vịn Nhân sự</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <form th:action="@{/admin/staffs/save}" method="post">
                        <div class="modal-body">
                            <!-- Hidden ID field for update -->
                            <input type="hidden" id="st_id" name="id" />
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">Họ và Tên</label>
                                <input type="text" class="form-control" id="st_fullName" name="fullName" required placeholder="Họ Tên">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Mã số phân phối (Tên đăng nhập)</label>
                                <input type="text" class="form-control" id="st_username" name="username" required placeholder="Nhập ID Duy nhất">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Mật khẩu mới (Bỏ trống nếu giữ nguyên)</label>
                                <input type="password" class="form-control" id="st_password" name="password" placeholder="Nhập để cập nhật">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Vai trò (Role)</label>
                                <select class="form-select" id="st_role" name="role" required>
                                    <option value="STAFF">Cán bộ / Giáo viên / Nhân viên (STAFF)</option>
                                    <option value="DRIVER">Tài xế (DRIVER)</option>
                                </select>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                            <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Lưu lại</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Inline JS to handle modal population -->
        <script>
            function clearForm() {
                document.getElementById('st_id').value = '';
                document.getElementById('st_fullName').value = '';
                document.getElementById('st_username').value = '';
                document.getElementById('st_password').value = '';
                document.getElementById('st_role').value = 'STAFF';
            }

            function editStaff(id, fullName, username, role) {
                document.getElementById('st_id').value = id;
                document.getElementById('st_fullName').value = fullName;
                document.getElementById('st_username').value = username;
                document.getElementById('st_password').value = ''; // Don't show old password
                document.getElementById('st_role').value = role;
                
                var myModal = new bootstrap.Modal(document.getElementById('staffModal'));
                myModal.show();
            }
        </script>
    </div>
</body>
</html>
