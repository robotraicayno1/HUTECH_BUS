<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: layout(~{::div}, 'Quản lý Trạm Dừng', 'stops')}">
<body>
    <div>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Quản lý Trạm Dừng</h2>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#stopModal" onclick="clearForm()">
                <i class="bi bi-plus-circle"></i> Thêm Trạm Mới
            </button>
        </div>

        <div class="card card-custom p-4">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Tên Trạm</th>
                            <th>Mô tả</th>
                            <th>Tọa độ (Lat, Lng)</th>
                            <th class="text-end">Hành động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="s : ${stops}">
                            <td class="fw-bold" th:text="${s.name}">HUTECH Campus A</td>
                            <td class="text-muted" th:text="${s.description}">Trạm chính tại cơ sở ĐBP</td>
                            <td>
                                <span class="badge bg-light text-dark border">
                                    <i class="bi bi-geo-alt-fill text-danger"></i>
                                    <span th:text="${s.latitude} + ', ' + ${s.longitude}">10.8000, 106.7000</span>
                                </span>
                            </td>
                            <td class="text-end">
                                <button class="btn btn-sm btn-outline-primary me-2" 
                                        th:attr="onclick=|editStop('${s.id}', '${s.name}', '${s.latitude}', '${s.longitude}', '${s.description}')|">
                                    <i class="bi bi-pencil"></i> Sửa
                                </button>
                                <form th:action="@{/admin/stops/delete/{id}(id=${s.id})}" method="post" class="d-inline" onsubmit="return confirm('Bạn có chắc chắn muốn xóa trạm này? Các tuyến đường có chứa trạm này sẽ có thể bị lỗi lộ trình.');">
                                    <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i> Xóa</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(stops)}">
                            <td colspan="4" class="text-center text-muted py-4">Chưa có dữ liệu trạm dừng nào.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Add/Edit Modal -->
        <div class="modal fade" id="stopModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content border-0 shadow-lg">
                    <div class="modal-header bg-primary text-white">
                        <h5 class="modal-title" id="stopModalLabel">Thông tin Trạm Dừng</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <form th:action="@{/admin/stops/save}" th:object="${newStop}" method="post">
                        <div class="modal-body">
                            <!-- Hidden ID field for update -->
                            <input type="hidden" id="s_id" name="id" />
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">Tên Trạm</label>
                                <input type="text" class="form-control" id="s_name" name="name" required placeholder="VD: Trạm Đại Học HUTECH">
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Vĩ độ (Latitude)</label>
                                    <input type="number" step="any" class="form-control" id="s_latitude" name="latitude" required placeholder="10.801...">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Kinh độ (Longitude)</label>
                                    <input type="number" step="any" class="form-control" id="s_longitude" name="longitude" required placeholder="106.711...">
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">Mô tả thêm</label>
                                <textarea class="form-control" id="s_description" name="description" rows="2" placeholder="Ghi chú về vị trí trạm..."></textarea>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                            <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Lưu lại</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Inline JS to handle modal population -->
        <script>
            function clearForm() {
                document.getElementById('s_id').value = '';
                document.getElementById('s_name').value = '';
                document.getElementById('s_latitude').value = '';
                document.getElementById('s_longitude').value = '';
                document.getElementById('s_description').value = '';
            }

            function editStop(id, name, lat, lng, description) {
                document.getElementById('s_id').value = id;
                document.getElementById('s_name').value = name;
                document.getElementById('s_latitude').value = lat;
                document.getElementById('s_longitude').value = lng;
                document.getElementById('s_description').value = description;
                
                var myModal = new bootstrap.Modal(document.getElementById('stopModal'));
                myModal.show();
            }
        </script>
    </div>
</body>
</html>
