<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: layout(~{::div}, 'Quản lý Thẻ Buy-Pass', 'buy-pass')}">
<body>
    <div>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="mb-0">🎫 Quản lý Gói Cước Buy-Pass</h2>
                <p class="text-muted mb-0" style="font-size:0.9rem;">Tạo và cấu hình các gói thẻ vé để sinh viên mua</p>
            </div>
            <div class="d-flex gap-2 align-items-center">
                <button class="btn btn-primary fw-bold" data-bs-toggle="modal" data-bs-target="#packageModal" onclick="clearPackageForm()">
                    <i class="bi bi-plus-circle"></i> Thêm Gói Cước
                </button>
            </div>
        </div>

        <div class="card-custom p-4">
            <div class="table-responsive">
                <table class="table table-hover align-middle" id="packageTable">
                    <thead class="table-light">
                        <tr>
                            <th>#</th>
                            <th>Tên Gói</th>
                            <th>Loại thẻ</th>
                            <th>Thời hạn</th>
                            <th>Giá (VNĐ)</th>
                            <th>Mô tả</th>
                            <th class="text-end">Hành động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="p, stat : ${packages}">
                            <td class="text-muted" th:text="${stat.count}"></td>
                            <td class="fw-bold text-navy" th:text="${p.name}"></td>
                            <td>
                                <span class="badge rounded-pill px-3 py-2"
                                      th:classappend="${p.type == 'WEEK' ? 'bg-info text-dark' : (p.type == 'MONTH' ? 'bg-primary' : 'bg-success')}"
                                      th:text="${p.type == 'WEEK' ? 'Thẻ Tuần' : (p.type == 'MONTH' ? 'Thẻ Tháng' : 'Thẻ Năm')}">
                                </span>
                            </td>
                            <td th:text="${p.durationDays + ' ngày'}"></td>
                            <td class="fw-bold text-success" th:text="${#numbers.formatInteger(p.price, 0, 'POINT') + ' đ'}"></td>
                            <td th:text="${p.description}"></td>
                            <td class="text-end">
                                <button class="btn btn-sm btn-outline-primary me-1"
                                        th:attr="data-id=${p.id},
                                                 data-name=${p.name},
                                                 data-type=${p.type},
                                                 data-price=${p.price},
                                                 data-duration=${p.durationDays},
                                                 data-desc=${p.description}"
                                        onclick="editPackageFromBtn(this)">
                                    <i class="bi bi-pencil"></i> Sửa
                                </button>
                                <form th:action="@{/admin/buy-pass/delete/{id}(id=${p.id})}" method="post" class="d-inline"
                                      onsubmit="return confirm('Xóa gói cước này?');">
                                    <button type="submit" class="btn btn-sm btn-outline-danger">
                                        <i class="bi bi-trash"></i> Xóa
                                    </button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(packages)}">
                            <td colspan="7" class="text-center text-muted py-5">
                                <i class="bi bi-tags" style="font-size:2rem;"></i><br>
                                Chưa có gói cước nào. Nhấn "Thêm Gói Cước" để bắt đầu.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Add / Edit Modal -->
        <div class="modal fade" id="packageModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content border-0 shadow-lg">
                    <div class="modal-header text-white" style="background: linear-gradient(135deg, #1565c0, #003366);">
                        <h5 class="modal-title"><i class="bi bi-tags"></i> Thông tin Gói Cước</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <form th:action="@{/admin/buy-pass/save}" method="post">
                        <div class="modal-body">
                            <input type="hidden" id="p_id" name="id" />

                            <div class="mb-3">
                                <label class="form-label fw-bold">Tên Gói Cước (VD: Thẻ Tuần Sinh Viên)</label>
                                <input type="text" class="form-control" id="p_name" name="name" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Phân loại (Type)</label>
                                <select class="form-select" id="p_type" name="type" required onchange="autoSuggest()">
                                    <option value="WEEK">Thẻ Tuần (WEEK)</option>
                                    <option value="MONTH">Thẻ Tháng (MONTH)</option>
                                    <option value="YEAR">Thẻ Năm (YEAR)</option>
                                </select>
                            </div>
                            <div class="row g-3 mb-3">
                                <div class="col-6">
                                    <label class="form-label fw-bold">Thời hạn (ngày)</label>
                                    <input type="number" class="form-control" id="p_duration"
                                           name="durationDays" required min="1" value="7">
                                </div>
                                <div class="col-6">
                                    <label class="form-label fw-bold">Giá tiền (VNĐ)</label>
                                    <input type="number" class="form-control" id="p_price"
                                           name="price" required min="0" value="50000">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Mô tả thêm</label>
                                <input type="text" class="form-control" id="p_description" name="description"
                                       required placeholder="Ví dụ: Đi xe không giới hạn 7 ngày">
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                            <button type="submit" class="btn btn-primary fw-bold">
                                <i class="bi bi-save"></i> Lưu Gói
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <script>
            function clearPackageForm() {
                document.getElementById('p_id').value = '';
                document.getElementById('p_name').value = 'Thẻ Tuần';
                document.getElementById('p_type').value = 'WEEK';
                document.getElementById('p_duration').value = '7';
                document.getElementById('p_price').value = '50000';
                document.getElementById('p_description').value = 'Hiệu lực 7 ngày';
            }

            function autoSuggest() {
                const type = document.getElementById('p_type').value;
                if (type === 'WEEK') {
                    document.getElementById('p_name').value = 'Thẻ Tuần';
                    document.getElementById('p_duration').value = '7';
                    document.getElementById('p_price').value = '50000';
                    document.getElementById('p_description').value = 'Hiệu lực 7 ngày';
                } else if (type === 'MONTH') {
                    document.getElementById('p_name').value = 'Thẻ Tháng';
                    document.getElementById('p_duration').value = '30';
                    document.getElementById('p_price').value = '180000';
                    document.getElementById('p_description').value = 'Hiệu lực 30 ngày';
                } else if (type === 'YEAR') {
                    document.getElementById('p_name').value = 'Thẻ Năm';
                    document.getElementById('p_duration').value = '365';
                    document.getElementById('p_price').value = '1500000';
                    document.getElementById('p_description').value = 'Hiệu lực 1 năm';
                }
            }

            function editPackageForm(id, name, type, price, duration, desc) {
                document.getElementById('p_id').value = id;
                document.getElementById('p_name').value = name;
                document.getElementById('p_type').value = type;
                document.getElementById('p_duration').value = duration;
                document.getElementById('p_price').value = price;
                document.getElementById('p_description').value = desc;
                
                var myModal = new bootstrap.Modal(document.getElementById('packageModal'));
                myModal.show();
            }

            function editPackageFromBtn(btn) {
                editPackageForm(
                    btn.dataset.id,
                    btn.dataset.name,
                    btn.dataset.type,
                    btn.dataset.price,
                    btn.dataset.duration,
                    btn.dataset.desc
                );
            }
        </script>
    </div>
</body>
</html>
